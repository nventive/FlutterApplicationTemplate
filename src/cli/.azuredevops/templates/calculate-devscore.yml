parameters:
- name: pathToSrc
  type: string
  default: '$(Build.SourcesDirectory)/src/cli'
- name: artifactName
  type: string
  default: ''

steps:
- powershell: Set-Location ${{ parameters.pathToSrc }}
  displayName: 'Set Location to CLI Folder'

- task: PowerShell@2
  displayName: 'Execute Build Runner'
  inputs:
    targetType: 'inline'
    script: |
      cd ${{ parameters.pathToSrc }}
      dart run build_runner build --delete-conflicting-outputs
  
# - script: |
#     dart pub global activate pana
#   displayName: 'Activate pana tool'

# - script: |
#     pana > $(Build.SourcesDirectory)/src/cli/pana-analysis.md
#   displayName: 'Calculate pub.dev score'

- script: |
    dart pub global activate pana
    %LOCALAPPDATA%\Pub\Cache\bin\pana
  displayName: 'Run Pana Analysis'

- task: PublishBuildArtifacts@1
  displayName: 'Publish Analysis Report'
  inputs:
    PathtoPublish: '${{parameters.artifactName}}'
    ArtifactName: ${{parameters.artifactName}}_PanaAnalysis
    TargetPath: '$(Build.SourcesDirectory)/src/cli/pana-analysis.md'
    publishLocation: 'Container'